esphome:
  name: ld2451-validate
  friendly_name: LD2451 Validate

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: "test"
  password: "testtest"

external_components:
  - source:
      type: local
      path: ../../components
    components: [ld2451]

uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 115200

ld2451:
  id: radar
  uart_id: uart_bus
  controls:
    max_distance:
      name: "LD2451 Max Distance"
    min_distance:
      name: "LD2451 Min Distance"
    min_speed:
      name: "LD2451 Min Speed"
    no_target_delay:
      name: "LD2451 No Target Delay"
    trigger_count:
      name: "LD2451 Trigger Count"
    min_snr:
      name: "LD2451 Min SNR"
    snr_threshold:
      name: "LD2451 App SNR Threshold"
    speed_correction:
      name: "LD2451 Speed Correction"
    detection_direction:
      name: "LD2451 Detection Direction"
  target_count:
    name: "LD2451 Target Count"
  vehicle_detected:
    name: "LD2451 Vehicle Detected"
  angle:
    name: "LD2451 Angle"
  distance:
    name: "LD2451 Distance"
  speed:
    name: "LD2451 Speed"
  snr:
    name: "LD2451 SNR"
  direction:
    name: "LD2451 Direction"
