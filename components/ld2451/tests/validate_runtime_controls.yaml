esphome:
  name: ld2451-runtime-controls

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: "test"
  password: "testtest"

external_components:
  - source:
      type: local
      path: ../../../components
    components: [ld2451]

uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 115200

ld2451:
  id: radar
  uart_id: uart_bus
  max_distance: 100
  min_distance: 5
  min_speed: 10
  detection_direction: both
  no_target_delay: 2
  trigger_count: 2
  min_snr: 4
  speed_correction: 1.05
  controls:
    max_distance:
      name: "LD2451 Max Distance"
    min_distance:
      name: "LD2451 Min Distance"
    min_speed:
      name: "LD2451 Min Speed"
    no_target_delay:
      name: "LD2451 No Target Delay"
    trigger_count:
      name: "LD2451 Trigger Count"
    min_snr:
      name: "LD2451 Min SNR"
    snr_threshold:
      name: "LD2451 App SNR Threshold"
    speed_correction:
      name: "LD2451 Speed Correction"
    detection_direction:
      name: "LD2451 Detection Direction"
